name: Update rem-cli Formula

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-rem-cli
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v6.0.3
        with:
          ref: main

      - name: Check latest version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_tag="$(
            curl --fail --silent --show-error --location \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/tttol/rem-cli/tags?per_page=1" |
              jq --raw-output '.[0].name // empty'
          )"

          if [[ ! "${latest_tag}" =~ ^v.+ ]]; then
            echo "Error: latest tag is empty or has an unexpected format: ${latest_tag}"
            exit 1
          fi

          latest_version="${latest_tag#v}"
          current_version="$(sed -n 's/^  version "\([^"]*\)"/\1/p' Formula/rem-cli.rb)"

          if [[ -z "${current_version}" ]]; then
            echo "Error: current version was not found in Formula/rem-cli.rb"
            exit 1
          fi

          echo "Latest version: ${latest_version}"
          echo "Current version: ${current_version}"
          echo "latest=${latest_version}" >> "${GITHUB_OUTPUT}"

          if [[ "${latest_version}" == "${current_version}" ]]; then
            echo "needs_update=false" >> "${GITHUB_OUTPUT}"
            echo "Formula/rem-cli.rb is already up to date."
          else
            echo "needs_update=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Update Formula
        if: steps.version.outputs.needs_update == 'true'
        run: ./update_rem-cli_file.sh "${{ steps.version.outputs.latest }}"

      - name: Commit and push changes
        if: steps.version.outputs.needs_update == 'true'
        env:
          VERSION: ${{ steps.version.outputs.latest }}
        run: |
          if git diff --quiet -- Formula/rem-cli.rb; then
            echo "Formula/rem-cli.rb has no changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/rem-cli.rb
          git commit -m "Update rem-cli to ${VERSION}"
          git push origin HEAD:main
